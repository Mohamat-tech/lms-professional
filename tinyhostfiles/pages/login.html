<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LMS Sophisti qué - Plateforme d'apprentissage innovante">
    <meta name="theme-color" content="#0066FF">
    <title>LMS - Connexion</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">

    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gradient-primary);
            padding: var(--spacing-lg);
        }

        .login-card {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideInUp var(--transition-base);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .login-header .logo {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-md);
        }

        .login-header h1 {
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .password-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-group input {
            flex: 1;
            padding-right: 40px;
        }

        .password-toggle {
            position: absolute;
            right: var(--spacing-md);
            background: none;
            border: none;
            cursor: pointer;
            font-size: var(--font-size-lg);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .remember-me label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: var(--font-size-md);
            font-weight: 600;
            border: none;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }

        .signup-link p {
            color: var(--text-secondary);
            margin: 0;
        }

        .signup-link a {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .footer-credit {
            text-align: center;
            margin-top: var(--spacing-2xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }

        @media (max-width: 767px) {
            .login-container {
                min-height: auto;
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .login-card {
                padding: var(--spacing-lg);
            }

            .login-header .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">🎓</div>
                <h1>Bienvenue</h1>
                <p>Plateforme d'apprentissage sophist iquée</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="votre@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-group">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                        <button type="button" class="password-toggle">👁️</button>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Se souvenir de moi</label>
                </div>

                <button type="submit" class="submit-btn">
                    Connexion
                </button>
            </form>

            <div class="signup-link">
                <p>Pas encore de compte? <a href="signup.html">S'inscrire</a></p>
            </div>

            <div class="footer-credit">
                LMS développé par NDAOBA MOHAMAT 24G2687
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/ui-utils.js"></script>
</body>
</html>
